<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: #1e293b;
    }

    .container {
      width: 350px;
      padding: 30px;
      text-align: center;
      border-radius: 20px;
      background: #f8fafc;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-bottom: 20px;
      color: #0f172a;
    }

    .buttons button {
      margin: 8px;
      padding: 12px 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: #fff;
      background: #2563eb;
      transition: all 0.3s ease;
    }

    .buttons button:hover {
      transform: scale(1.1);
      background: #1d4ed8;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      min-height: 80px;
      border-radius: 10px;
      font-size: 16px;
      color: #0f172a;
      background: #e2e8f0;
    }

    .score-box {
      margin-top: 15px;
      font-weight: 600;
      color: #1e293b;
    }

    .reset-btn {
      margin-top: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: #fff;
      background: #ef4444;
      transition: 0.3s;
    }

    .reset-btn:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>✊ ✋ ✌ Rock Paper Scissors</h2>

    <div class="buttons">
      <button onclick="play('rock')">✊ Rock</button>
      <button onclick="play('paper')">✋ Paper</button>
      <button onclick="play('scissor')">✌ Scissor</button>
    </div>

    <div class="result-box js-result">
      Make your move!
    </div>

    <div class="score-box js-score"></div>

    <button class="reset-btn" onclick="resetScore()">Reset Score</button>
  </div>

  <script>
    let score = JSON.parse(localStorage.getItem('score')) || {
      Wins: 0,
      Losses: 0,
      Tie: 0
    };

    function updateDisplay(message = "Make your move!") {
      document.querySelector(".js-result").innerHTML = message;

      document.querySelector(".js-score").innerHTML =
        `Wins: ${score.Wins} | Losses: ${score.Losses} | Ties: ${score.Tie}`;
    }

    function play(userChoice) {
      const random = Math.random();
      let computerChoice;
      if (random < 1 / 3) computerChoice = "rock";
      else if (random < 2 / 3) computerChoice = "paper";
      else computerChoice = "scissor";

      let result;
      if (userChoice === computerChoice) {
        result = "😐 It's a tie!";
        score.Tie++;

      } 
      else if (
        (userChoice === "rock" && computerChoice === "scissor") ||
        (userChoice === "paper" && computerChoice === "rock") ||
        (userChoice === "scissor" && computerChoice === "paper")
      ) {
        result = "🎉 You win!";
        score.Wins++;

      } 
      else {
        result = "😢 You lose!";
        score.Losses++;
      }

      localStorage.setItem("score", JSON.stringify(score));

      updateDisplay(
        `You: ${userChoice} | Computer: ${computerChoice}<br><br>${result}`
      );
    }

    function resetScore() {
      score = { Wins: 0, Losses: 0, Tie: 0 };
      localStorage.removeItem("score");

      updateDisplay("🔄 Score reset!");
    }

    updateDisplay();
  </script>

</body>

</html>
