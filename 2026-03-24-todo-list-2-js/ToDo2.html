<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f5f5f5;
      text-align: center;
      margin-top: 40px;
    }

    .container {
      background: white;
      padding: 20px;
      width: 350px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 60%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      margin-left: 5px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
    }

    button:hover {
      opacity: 0.9;
    }

    .add-btn {
      background-color: green;
      color: white;
    }

    .delete-btn {
      background-color: red;
      color: white;
    }

    .todo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 8px;
      background: #fafafa;
      border-radius: 5px;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .count {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📝 Todo List</h2>
    <input placeholder="Enter task" class="js-input" onkeydown="if(event.key==='Enter') addList()">
    <button class="add-btn" onclick="addList()">Add</button>

    <p class="js-count count"></p>

    <div class="js-list"></div>
  </div>

  <script>
    let todoList = JSON.parse(localStorage.getItem('todos')) || [];

    renderList();

    function addList() {
      const inputElement = document.querySelector('.js-input');
      const name = inputElement.value.trim();

      if (name === '') return;

      if (todoList.some(t => t.name === name)) {
        alert("Task already exists!");
        return;
      }

      todoList.push({name: name, completed: false});
      inputElement.value = '';
      saveData();
      renderList();
    }

    function deleteTodo(index) {
      todoList.splice(index, 1);
      saveData();
      renderList();
    }

    function toggleComplete(index) {
      todoList[index].completed = !todoList[index].completed;
      saveData();
      renderList();
    }

    function renderList() {
      const listElement = document.querySelector('.js-list');
      const countElement = document.querySelector('.js-count');

      let html = '';
      for (let i = 0; i < todoList.length; i++) {
        html += `<div class="todo-item">
            <span 
              onclick="toggleComplete(${i})"
              class="${todoList[i].completed ? 'completed' : ''}"
              style="cursor:pointer;"
            >
              ${todoList[i].name}
            </span>
            <button class="delete-btn" onclick="deleteTodo(${i})">Delete</button>
          </div>`;
      }

      listElement.innerHTML = html;

      let completedCount = todoList.filter(t => t.completed).length;
      countElement.innerText = `Total: ${todoList.length} | Completed: ${completedCount}`;
    }

    function saveData() {
      localStorage.setItem('todos', JSON.stringify(todoList));
    }
  </script>

</body>
</html>
